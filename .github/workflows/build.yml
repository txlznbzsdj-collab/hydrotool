# HydroTool 跨平台打包 — GUI 安装程序
#
# 推 v* 标签自动触发:
# - 构建 Web UI (React + Vite)
# - PyInstaller 打包 Python + 前端 (单文件 exe)
# - Windows: Inno Setup GUI 安装向导
# - Linux/macOS: 压缩包
# - 上传到 GitHub Release

name: 跨平台打包

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: 构建 Web UI
        run: |
          cd frontend
          npm install
          npm run build

      - name: 安装 Python 依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包 (含前端)
        run: pyinstaller packaging/hydrotool-windows.spec

      - name: Inno Setup GUI 安装程序
        run: |
          choco install innosetup -y --no-progress --limit-output 2>$null
          $iscc = Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source }
          if ($iscc) {
            & $iscc packaging\hydrotool-setup.iss
          } else {
            Write-Warning "Inno Setup not found, skipping GUI installer"
          }

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Output/hydrotool-setup-*.exe

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: 构建 Web UI
        run: |
          cd frontend
          npm install
          npm run build

      - name: 安装 Python 依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/hydrotool-linux.spec

      - name: 压缩
        run: cd dist && tar czf hydrotool-linux-x86_64.tar.gz hydrotool

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hydrotool-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: 构建 Web UI
        run: |
          cd frontend
          npm install
          npm run build

      - name: 安装 Python 依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/hydrotool-macos.spec

      - name: 压缩
        run: cd dist && zip -r hydrotool-macos.zip hydrotool.app

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hydrotool-macos.zip
