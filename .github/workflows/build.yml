# HydroTool 跨平台打包工作流
#
# 当推送 v* 标签时自动触发：
# - Windows → hydrotool.exe
# - Linux   → hydrotool 可执行文件
# - macOS   → hydrotool macOS 可执行文件
#
# 产物自动上传到 GitHub Release

name: 跨平台打包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/hydrotool-windows.spec

      - name: 上传 hydrotool.exe 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hydrotool.exe

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/hydrotool-linux.spec

      - name: 压缩二进制文件
        run: |
          cd dist
          tar czf hydrotool-linux-x86_64.tar.gz hydrotool

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hydrotool-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller packaging/hydrotool-macos.spec

      - name: 压缩 .app
        run: |
          cd dist
          zip -r hydrotool-macos.zip hydrotool.app

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hydrotool-macos.zip
